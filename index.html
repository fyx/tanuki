<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tanuki Background</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        background-color: #0f1220;
        background-image: url("tanuki_blush.gif"), linear-gradient(#0f1220, #0f1220);
        background-repeat: repeat, no-repeat;
        background-size: 200px auto, cover;
        background-blend-mode: multiply;
      }
    </style>
  </head>
  <body></body>
</html>
