<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tanuki Background</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        /* Dark navy makes bright PNG edges stand out. */
        background-color: #0b1021;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: -50%;
        background-image: url("tanuki.png");
        background-repeat: repeat;
        background-size: 60px auto;
        transform: rotate(45deg);
        transform-origin: center;
        z-index: -1;
      }
    </style>
  </head>
  <body></body>
</html>
